# StockFlow — sync race-condition fix

Two small edits to your existing `index.html` (or `stockflow.js`). No other
files or functions need to change.

---

## Edit 1 — Replace `syncToSheet` (and add 3 lines above it)

**Find this block** (appears once in `<script>`, under `GOOGLE SHEETS API LOGIC`):

```js
async function syncToSheet(scanLog=null) {
  localStorage.setItem('sf_v3', JSON.stringify(items));
  localStorage.setItem('sf_sup_v3', JSON.stringify(suppliers));
  localStorage.setItem('sf_variants', JSON.stringify(variants));
  localStorage.setItem('sf_recipes', JSON.stringify(recipes));
  localStorage.setItem('sf_iterations', JSON.stringify(iterations));

  if (!SCRIPT_URL || !isConnected) return;

  try {
    setSyncState('syncing', 'Syncing to cloud...');
    const payload = { items, suppliers, variants, recipes, iterations };
    if (scanLog) payload.scanLog = scanLog;
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    updateLastSync();
    setSyncState('connected', 'Connected');
  } catch(e) {
    setSyncState('error', 'Sync failed! Saved locally.');
    console.error('Sync error:', e);
  }
}
```

**Replace it with:**

```js
let syncInFlight = false;
let syncQueued = false;
let pendingScanLogs = [];

async function syncToSheet(scanLog=null) {
  if (scanLog) pendingScanLogs.push(scanLog);

  localStorage.setItem('sf_v3', JSON.stringify(items));
  localStorage.setItem('sf_sup_v3', JSON.stringify(suppliers));
  localStorage.setItem('sf_variants', JSON.stringify(variants));
  localStorage.setItem('sf_recipes', JSON.stringify(recipes));
  localStorage.setItem('sf_iterations', JSON.stringify(iterations));

  if (!SCRIPT_URL || !isConnected) return;

  // If a sync is already in flight, just flag that another is needed once
  // it finishes — never let two POSTs race each other to the sheet.
  if (syncInFlight) { syncQueued = true; return; }
  syncInFlight = true;

  do {
    syncQueued = false;
    const logsToSend = pendingScanLogs.splice(0, pendingScanLogs.length);
    try {
      setSyncState('syncing', 'Syncing to cloud...');
      const payload = { items, suppliers, variants, recipes, iterations };
      if (logsToSend.length) payload.scanLogs = logsToSend;
      await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      updateLastSync();
      setSyncState('connected', 'Connected');
    } catch(e) {
      setSyncState('error', 'Sync failed! Saved locally.');
      console.error('Sync error:', e);
    }
  } while (syncQueued); // pick up anything queued while we were mid-flight

  syncInFlight = false;
}
```

If you're using the standalone `stockflow.js`, this is the same block near
`GOOGLE SHEETS API LOGIC` — same swap applies there.

## Edit 2 — Clearer per-scan toast message

**In `processBarcodeScan(mode)`**, find this line near the end of the function
(right before `inputEl.value=''; qtyEl.value=1; ...`):

```js
toast(isAdd?'✅':'📤', `${isAdd?'+':'-'}${qty} · ${item.name}${variantNote} · Stock: ${before}→${after}`);
```

*(If you're on the `stockflow.js` version, the equivalent line is:)*

```js
toast('✅', `${isAdd?'+':'-'}${qty}${variantNote} → ${item.name} stock: ${after}`);
```

**Replace whichever one you have with:**

```js
const verb = isAdd ? 'Added to' : 'Removed from';
toast(isAdd?'✅':'📤', `${verb} ${item.name}${variantNote}: ${before} → ${after}`);
```

This gives a message like:
`✅ Added to Candle [Orange]: 3 → 4`

## Backend — deploy the new Code.gs

1. Open your Sheet → **Extensions → Apps Script**
2. Select all existing code, delete it, paste in `Code.gs` (attached separately)
3. **Deploy → Manage deployments → Edit (pencil icon) → New version → Deploy**
   (Using "New deployment" instead will give you a *new URL* and break your
   existing connection — always use "Manage deployments → Edit" for updates.)
4. A `ScanLog` sheet tab will be created automatically on the first scan
   after deploying, with clean columns: `timestamp | mode | itemName | sku |
   barcode | qty | before | after` — same shape as what you pasted, but it
   will now stay in sync with `Items` instead of racing it.

## Why this fixes it

Your 4 log rows firing 200ms apart were each triggering a full POST of the
*entire* `items` array as a snapshot. Because network timing isn't
guaranteed, a POST built from an *earlier* snapshot could land at Google's
servers *after* a POST from a *later* one — and since the old script cleared
and rewrote the whole `Items` sheet each time, the last write won even if it
was stale. The `ScanLog` looked fine because it only appended, but `Items`
could revert to an old stock number.

The fix queues syncs client-side so only one POST is ever in flight, and
adds a server-side lock as a second safety net — plus the log sheet itself
now genuinely only appends (it used to be silently dropped entirely, since
the old `doPost` never read `data.scanLog` at all).
